<div class="music-container">
  <h1>Mi Música</h1>
  <p>Reproductor local de música - Los archivos se almacenan en tu dispositivo</p>

  <button (click)="showForm = !showForm" class="btn-primary">
    {{ showForm ? 'Cancelar' : 'Registrar Canción' }}
  </button>

  <div *ngIf="showForm" class="create-form card">
    <h2>Registrar Nueva Canción</h2>
    <form [formGroup]="createForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Nombre del Archivo:</label>
        <input type="text" formControlName="fileName" />
      </div>
      <div class="form-group">
        <label>Título:</label>
        <input type="text" formControlName="title" />
      </div>
      <div class="form-group">
        <label>Artista:</label>
        <input type="text" formControlName="artist" />
      </div>
      <div class="form-group">
        <label>Álbum:</label>
        <input type="text" formControlName="album" />
      </div>
      <div class="form-group">
        <label>Género:</label>
        <input type="text" formControlName="genre" />
      </div>
      <div class="form-group">
        <label>Duración (segundos):</label>
        <input type="number" formControlName="durationSeconds" />
      </div>
      <button type="submit" class="btn-primary" [disabled]="createForm.invalid">Registrar</button>
    </form>
  </div>

  <div *ngIf="loading" class="loading">Cargando...</div>

  <div *ngIf="!loading && musicFiles.length === 0" class="empty-state">
    <p>No tienes canciones registradas aún</p>
  </div>

  <div *ngIf="!loading" class="music-grid">
    <div *ngFor="let music of musicFiles" class="music-card">
      <div class="music-header">
        <h3>{{ music.title }}</h3>
        <small *ngIf="music.artist">{{ music.artist }}</small>
      </div>
      <div class="music-details">
        <p *ngIf="music.album"><strong>Álbum:</strong> {{ music.album }}</p>
        <p *ngIf="music.genre"><strong>Género:</strong> {{ music.genre }}</p>
        <p *ngIf="music.duration"><strong>Duración:</strong> {{ formatDuration(music.duration) }}</p>
      </div>
      <button (click)="deleteMusicFile(music.id)" class="btn-danger">Eliminar</button>
    </div>
  </div>
</div>
