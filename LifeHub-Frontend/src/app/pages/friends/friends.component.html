<div class="friends-container">
  <h1>Mis Amigos</h1>

  <div *ngIf="loading" class="loading">Cargando...</div>

  <div *ngIf="!loading && friendships.length === 0" class="empty-state">
    <p>Aún no tienes amigos. ¡Comienza a buscar!</p>
  </div>

  <div *ngIf="!loading && friendships.length > 0" class="friendships-list">
    <div *ngFor="let friendship of friendships" class="friendship-card">
      <div class="friendship-info">
        <p><strong>{{ getFriendshipStatusText(friendship.status) }}</strong></p>
        <small>{{ friendship.createdAt | date }}</small>
      </div>
      <div class="friendship-actions">
        <button 
          *ngIf="friendship.status === 'Pending'" 
          (click)="acceptRequest(friendship.id)" 
          class="btn-success">Aceptar</button>
        <button 
          *ngIf="friendship.status === 'Pending'" 
          (click)="rejectRequest(friendship.id)" 
          class="btn-danger">Rechazar</button>
        <button 
          *ngIf="friendship.status === 'Accepted'" 
          (click)="removeFriend(friendship.id)" 
          class="btn-danger">Eliminar</button>
      </div>
    </div>
  </div>
</div>
