<div class="register-container">
  <div class="register-card">
    <h1>LifeHub Register</h1>
    
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div *ngIf="error" class="alert alert-error">{{ error }}</div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="Enter your email"
          [class.is-invalid]="submitted && f['email'].errors"
        />
        <div *ngIf="submitted && f['email'].errors" class="error-message">
          <span *ngIf="f['email'].errors['required']">Email es requerido</span>
          <span *ngIf="f['email'].errors['email']">Email inválido</span>
        </div>
      </div>

      <div class="form-group">
        <label for="fullName">Nombre Completo:</label>
        <input
          type="text"
          id="fullName"
          formControlName="fullName"
          placeholder="Enter your full name"
          [class.is-invalid]="submitted && f['fullName'].errors"
        />
        <div *ngIf="submitted && f['fullName'].errors" class="error-message">
          <span *ngIf="f['fullName'].errors['required']">Nombre es requerido</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña:</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Enter your password (min 6 characters)"
          [class.is-invalid]="submitted && f['password'].errors"
        />
        <div *ngIf="submitted && f['password'].errors" class="error-message">
          <span *ngIf="f['password'].errors['required']">Contraseña es requerida</span>
          <span *ngIf="f['password'].errors['minlength']">Mínimo 6 caracteres</span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña:</label>
        <input
          type="password"
          id="confirmPassword"
          formControlName="confirmPassword"
          placeholder="Confirm your password"
          [class.is-invalid]="submitted && f['confirmPassword'].errors"
        />
        <div *ngIf="submitted && f['confirmPassword'].errors" class="error-message">
          <span *ngIf="f['confirmPassword'].errors['required']">Confirmar contraseña es requerido</span>
        </div>
      </div>

      <button type="submit" class="btn-primary btn-full" [disabled]="loading">
        {{ loading ? 'Registrando...' : 'Registrarse' }}
      </button>
    </form>

    <p class="login-link">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a>
    </p>
  </div>
</div>
