<div class="recommendations-container">
  <h1>Recomendaciones</h1>

  <button (click)="showForm = !showForm" class="btn-primary">
    {{ showForm ? 'Cancelar' : 'Nueva Recomendación' }}
  </button>

  <div *ngIf="showForm" class="create-form card">
    <h2>Crear Recomendación</h2>
    <form [formGroup]="createForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Título:</label>
        <input type="text" formControlName="title" required />
      </div>
      <div class="form-group">
        <label>Descripción:</label>
        <textarea formControlName="description" required></textarea>
      </div>
      <div class="form-group">
        <label>Tipo:</label>
        <select formControlName="type">
          <option [value]="0">Película</option>
          <option [value]="1">Libro</option>
          <option [value]="2">Series</option>
        </select>
      </div>
      <div class="form-group">
        <label>Género:</label>
        <input type="text" formControlName="genre" />
      </div>
      <button type="submit" class="btn-primary" [disabled]="createForm.invalid">Crear</button>
    </form>
  </div>

  <div *ngIf="loading" class="loading">Cargando...</div>

  <div *ngIf="!loading && recommendations.length === 0" class="empty-state">
    <p>No hay recomendaciones aún</p>
  </div>

  <div *ngIf="!loading" class="recommendations-grid">
    <div *ngFor="let rec of recommendations" class="recommendation-card">
      <h3>{{ rec.title }}</h3>
      <p>{{ getTypeText(rec.type) }}</p>
      <p>{{ rec.description }}</p>
      <div class="rating">⭐ {{ rec.averageRating ? rec.averageRating.toFixed(1) : 'N/A' }} ({{ rec.ratingCount }})</div>
      <button (click)="deleteRecommendation(rec.id)" class="btn-danger">Eliminar</button>
    </div>
  </div>
</div>
